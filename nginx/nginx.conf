# ─────────────────────────────────────────────────────────────────────────
# EA Arch Agent — nginx reverse proxy
#
# Critical SSE directives for /arch-assistant/api/analyze and /api/compare:
#   - proxy_buffering off       (Otherwise nginx buffers tokens in chunks.)
#   - proxy_cache off
#   - proxy_read_timeout 3600s  (LLM streams can run minutes.)
#   - proxy_http_version 1.1    (SSE requires HTTP/1.1.)
#   - gzip off in the SSE block (gzip buffers entire response.)
# Also: backend sets `X-Accel-Buffering: no` header as a belt-and-braces.
#
# Phase 1: this config can be used in dev to validate SSE behavior locally.
# Phase 7: HTTPS termination + Certbot certs added.
# ─────────────────────────────────────────────────────────────────────────

worker_processes  auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 20 MB upload cap (frontend already limits to ~15 MB after compression).
    client_max_body_size 20m;

    # Default-on gzip — explicitly disabled in SSE locations below.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        # Dev: Vite dev server on 5173. Prod: built static served by an nginx
        # in the frontend container on port 80 (overridden in Phase 7).
        server frontend:5173;
    }

    # ── HTTP server (dev / pre-HTTPS) ──────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # SSE-aware location for streaming endpoints.
        location ~ ^/arch-assistant/api/(analyze|compare) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            gzip off;
        }

        # Standard JSON API endpoints.
        location /arch-assistant/api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Frontend (Vite dev server or built static).
        location /arch-assistant/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Root redirect to the app prefix.
        location = / {
            return 302 /arch-assistant/;
        }
    }

    # ── HTTPS server (production — Phase 7 fills in cert paths) ────────
    # server {
    #     listen 443 ssl http2;
    #     server_name arch-assistant.kpmg.example;
    #
    #     ssl_certificate     /etc/letsencrypt/live/arch-assistant.kpmg.example/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/arch-assistant.kpmg.example/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Same location blocks as :80 above.
    # }
}
