services:
  # Postgres — session/history persistence
  db:
    image: postgres:16-alpine
    container_name: arch-assistant-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kpmg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kpmg}
      POSTGRES_DB: ${POSTGRES_DB:-kpmg_arch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kpmg} -d ${POSTGRES_DB:-kpmg_arch}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Backend — FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arch-assistant-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama-shared:11434
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kpmg}:${POSTGRES_PASSWORD:-kpmg}@db:5432/${POSTGRES_DB:-kpmg_arch}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      arch-network:
      kpmg-network:
        aliases:
          - arch-assistant-backend
    restart: unless-stopped

  # Frontend — Vite dev server (local development only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: arch-assistant-frontend
    command: npm run dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      arch-network:
      kpmg-network:
        aliases:
          - arch-assistant-frontend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  arch-network:
    driver: bridge
  kpmg-network:
    external: true
    name: kpmg-infra_kpmg-network